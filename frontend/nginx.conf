# nginx config baked into the frontend image. Serves the built SPA and
# reverse-proxies the API, mirroring the Vite dev proxy (web-app-plan §7/§13).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: unknown paths fall back to index.html so
    # TanStack Router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy /api/* to the API container, stripping the /api prefix
    # (the trailing slash on proxy_pass does the strip): /api/jobs -> /jobs.
    # `api` is the compose service name.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-safe: no buffering/caching and a long read timeout so the live
        # progress stream (GET /api/jobs/{id}/events) and the chat token stream
        # (POST /api/runs/{id}/chat) are delivered incrementally and not cut.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }
}

# src/sam2/configs/sam2_hiera_t.yaml

# @package _global_

model:
  # CHANGE: Points to your new VideoProcessor location
  _target_: src.sam2.sam.sam2_video_processor.SAM2VideoPredictor

  image_encoder:
    # CHANGE: Points to your new ImageEncoder location
    _target_: src.sam2.image.image_encoder.ImageEncoder
    scalp: 1
    trunk:
      # CHANGE: Points to your new Hiera location
      _target_: src.sam2.image.hiera.Hiera
      embed_dim: 96
      num_heads: 1
      stages: [1, 2, 7, 2]
      global_att_blocks: [5, 7, 9]
      window_pos_embed_bkg_spatial_size: [7, 7]
    neck:
      # CHANGE: Points to your new Neck location
      _target_: src.sam2.image.image_encoder.FpnNeck
      position_encoding:
        # CHANGE: Points to your new Position Encoding location
        _target_: src.utils.position_encoding.PositionEmbeddingSine
        num_pos_feats: 256
        normalize: true
        scale: null
        temperature: 10000
      d_model: 256
      backbone_channel_list: [768, 384, 192, 96]
      fpn_top_down_levels: [2, 3]
      fpn_interp_model: nearest

  memory_attention:
    # CHANGE: Points to your new MemoryAttention location
    _target_: src.sam2.memory.memory_attention.MemoryAttention
    d_model: 256
    pos_enc_at_input: true
    layer:
      _target_: src.sam2.memory.memory_attention.MemoryAttentionLayer
      activation: relu
      dim_feedforward: 2048
      dropout: 0.1
      pos_enc_at_attn: false
      self_attention:
        # CHANGE: Points to your new RoPEAttention location
        _target_: src.sam2.mask.transformer.RoPEAttention
        rope_theta: 10000.0
        feat_sizes: [64, 64]
        embedding_dim: 256
        num_heads: 1
        downsample_rate: 1
        dropout: 0.1
      d_model: 256
      pos_enc_at_cross_attn_keys: true
      pos_enc_at_cross_attn_queries: false
      cross_attention:
        _target_: src.sam2.mask.transformer.RoPEAttention
        rope_theta: 10000.0
        feat_sizes: [64, 64]
        rope_k_repeat: True
        embedding_dim: 256
        num_heads: 1
        downsample_rate: 1
        dropout: 0.1
        kv_in_dim: 64
    num_layers: 4

  memory_encoder:
      # CHANGE: Points to your new MemoryEncoder location
      _target_: src.sam2.memory.memory_encoder.MemoryEncoder
      out_dim: 64
      position_encoding:
        _target_: src.utils.position_encoding.PositionEmbeddingSine
        num_pos_feats: 64
        normalize: true
        scale: null
        temperature: 10000
      mask_downsampler:
        _target_: src.sam2.memory.memory_encoder.MaskDownSampler
        kernel_size: 3
        stride: 2
        padding: 1
      fuser:
        _target_: src.sam2.memory.memory_encoder.Fuser
        layer:
          _target_: src.sam2.memory.memory_encoder.CXBlock
          dim: 256
          kernel_size: 7
          padding: 3
          layer_scale_init_value: 1e-6
          use_dwconv: True
        num_layers: 2

  num_maskmem: 7
  image_size: 1024
  sigmoid_scale_for_mem_enc: 20.0
  sigmoid_bias_for_mem_enc: -10.0
  use_mask_input_as_output_without_sam: true
  directly_add_no_mem_embed: true
  use_high_res_features_in_sam: true
  multimask_output_in_sam: true
  iou_prediction_use_sigmoid: True
  use_obj_ptrs_in_encoder: true
  add_tpos_enc_to_obj_ptrs: true
  proj_tpos_enc_in_obj_ptrs: true
  no_obj_embed_spatial: true
  only_obj_ptrs_in_the_past_for_eval: true
  pred_obj_scores: true
  pred_obj_scores_mlp: true
  fixed_no_obj_ptr: true
  multimask_output_for_tracking: true
  use_multimask_token_for_obj_ptr: true
  multimask_min_pt_num: 0
  multimask_max_pt_num: 1
  use_mlp_for_obj_ptr_proj: true
  compile_image_encoder: False
  sam_mask_decoder_extra_args: {}

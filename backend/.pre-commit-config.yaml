exclude: |
  (?x)^(
    backend/src/(sam2|dino)/.*|
    backend/checkpoints/.*|
    backend/extractor_artifacts/.*|
    backend/src/logs/.*|
    backend/src/utils/(sam2_utils|position_encoding|misc)\.py|
    .*\.(mp4|png|jpg)$
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: ['--markdown-linebreak-ext=md']
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=2000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        # Run from backend/ so the project's mypy (via uv) resolves the
        # config and source packages relative to the backend project root.
        entry: bash -c 'cd backend && exec uv run mypy --config-file=pyproject.toml --explicit-package-bases src/clip_scribe src/extractor src/ocr src/parser'
        language: system
        types: [python]
        pass_filenames: false

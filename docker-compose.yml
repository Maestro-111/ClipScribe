services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: clipscribe
      POSTGRES_PASSWORD: clipscribe
      POSTGRES_DB: clipscribe
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Celery broker + result backend, and the live-progress Redis Streams store.
  # In local dev the worker can run natively on the Mac for MPS, so it reaches
  # Redis at localhost:6379 via this host port mapping (web-app-plan §12).
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
